<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheapBux – Robux Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-gem">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <polygon points="12,2 22,9 18,21 6,21 2,9" fill="#FFD700"/>
          <polygon points="12,2 22,9 12,13" fill="rgba(255,255,255,0.3)"/>
        </svg>
      </div>
      <span class="logo-text">CHEAP<span class="logo-gold">BUX</span></span>
    </div>
    <nav class="nav">
      <button class="nbtn ghost" onclick="openOrders()">My Orders</button>
      <button class="nbtn gold" onclick="openAdmin()">⚙ Admin</button>
      <span class="nav-user" id="navUser">@guest</span>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <!-- Floating 3D orbs (CSS only) -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <div class="hero-content">
      <span class="hero-badge">⚡ Instant Delivery</span>
      <h1 class="hero-title">
        Turn <span class="hl">TTD</span> into <span class="hl hl--robux">Robux</span>
      </h1>
      <p class="hero-sub">1 TTD = 10 Robux &nbsp;·&nbsp; Fast, Safe &amp; Reliable</p>
    </div>

    <!-- 3D Floating gem -->
    <div class="gem-scene" aria-hidden="true">
      <div class="gem-3d">
        <div class="gem-face f-top"></div>
        <div class="gem-face f-front"></div>
        <div class="gem-face f-left"></div>
        <div class="gem-face f-right"></div>
        <div class="gem-face f-back"></div>
        <div class="gem-glow-ring"></div>
      </div>
    </div>
  </section>

  <!-- CALCULATOR -->
  <main class="main">
    <div class="card">

      <!-- TTD row -->
      <div class="row-between">
        <span class="card-label">You Pay <span class="dim">(TTD)</span></span>
        <div class="pill" id="amountPill">$0</div>
      </div>

      <!-- Slider -->
      <div class="slider-wrap">
        <input type="range" id="slider" min="0" max="100" value="0" step="1"
               oninput="onSlide(this.value)" />
        <div class="slider-ends"><span>$0</span><span>$100</span></div>
      </div>

      <!-- Quick picks -->
      <div class="picks">
        <button class="pick" onclick="snap(5)">$5</button>
        <button class="pick" onclick="snap(10)">$10</button>
        <button class="pick" onclick="snap(25)">$25</button>
        <button class="pick" onclick="snap(50)">$50</button>
        <button class="pick" onclick="snap(75)">$75</button>
        <button class="pick" onclick="snap(100)">$100</button>
      </div>

      <!-- Result panel -->
      <div class="result">
        <div class="result-left">
          <p class="result-tag">YOU RECEIVE</p>
          <div class="result-row">
            <div class="rcoin">R$</div>
            <span class="rnum" id="robuxNum">0</span>
            <span class="runit">R$</span>
          </div>
          <p class="rhint" id="rhint">Move the slider to calculate</p>
        </div>
        <div class="result-badge-3d" aria-hidden="true">
          <div class="rb3d-inner">R$</div>
          <div class="rb3d-shadow"></div>
        </div>
      </div>

      <!-- Form -->
      <div class="form">
        <div class="form-grid">
          <input class="inp" type="text"  id="username" placeholder="Roblox Username"
                 oninput="syncUser(this.value)" />
          <input class="inp" type="email" id="email"    placeholder="Email Address" />
        </div>
        <select class="inp isel" id="payment">
          <option value="">Payment Method</option>
          <option value="linx">Linx</option>
          <option value="cash">Cash</option>
          <option value="bank">Bank Transfer</option>
          <option value="paypal">PayPal</option>
          <option value="other">Other</option>
        </select>
        <div class="form-btns">
          <button class="bclear" onclick="resetForm()">Clear</button>
          <button class="border" onclick="placeOrder()">
            <span class="btn-glow"></span>
            🛒 Order Now
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ORDERS MODAL -->
  <div class="overlay" id="ordersModal" onclick="closeModal('ordersModal')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="mhead">
        <h2>My Orders</h2>
        <button class="mclose" onclick="closeModal('ordersModal')">&times;</button>
      </div>
      <div class="mbody" id="ordersBody"></div>
    </div>
  </div>

  <!-- ADMIN MODAL -->
  <div class="overlay" id="adminModal" onclick="closeModal('adminModal')">
    <div class="modal mwide" onclick="event.stopPropagation()">
      <div class="mhead">
        <h2>⚙ Admin Panel</h2>
        <button class="mclose" onclick="closeModal('adminModal')">&times;</button>
      </div>
      <div id="adminGate">
        <p class="gate-lbl">Enter Password</p>
        <div class="gate-row">
          <input class="inp" type="password" id="adminPass" placeholder="admin123" />
          <button class="border" onclick="checkPass()">Enter</button>
        </div>
        <p class="gate-hint">Default: admin123</p>
      </div>
      <div id="adminBoard" class="hidden">
        <div class="stats">
          <div class="stat"><div class="sv" id="sOrders">0</div><div class="sk">Orders</div></div>
          <div class="stat"><div class="sv" id="sRobux">0</div><div class="sk">R$ Sold</div></div>
          <div class="stat"><div class="sv" id="sTTD">$0</div><div class="sk">TTD Value</div></div>
        </div>
        <div class="mbody" id="adminBody"></div>
        <div class="mnuke">
          <button class="bclear" onclick="nukeOrders()">Clear All Orders</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
